        // Функция для динамической генерации HTML-списка треков
        function renderPlaylist() {
            const container = document.getElementById('tgPlaylist');
            if (!container) return;

            container.innerHTML = tracks.map((track, index) => {
                const trackNumber = String(index + 1).padStart(2, '0');
                return `
                    <a href="${track.link}" target="_blank" class="track-item">
                        <div class="track-info">
                            <span class="track-num">${trackNumber}</span>
                            <span class="track-name" title="${track.name}">${track.name}</span>
                        </div>
                        <span class="tg-listen-btn">
                            Слушать <i class="fa-brands fa-telegram"></i>
                        </span>
                    </a>
                `;
            }).join('');
        }

        // Запуск рендеринга после загрузки DOM
        document.addEventListener('DOMContentLoaded', renderPlaylist);
