    <style>
        .merch-container { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .merch-title { text-align: center; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .merch-subtitle { text-align: center; color: #777; margin-bottom: 40px; font-style: italic; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid #222; background: #0b0b0b; padding: 20px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: auto; border-radius: 2px; margin-bottom: 15px; }
        .product-name { font-size: 1.2rem; margin: 10px 0; font-weight: bold; color: #fff; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .product-price { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .btn-buy { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-buy:hover { background: #ccc; }
        .loader-text { text-align: center; font-size: 1.5rem; color: #fff; padding: 50px; }
    </style>
</head>

        async function initShop() {
            const container = document.getElementById('products-container');
            try {
                // Шаг 1. Прямой быстрый запрос без прокси (добавлен режим no-cors)
                const shopRes = await fetch('https://api.printify.com/v1/shops.json', {
                    method: 'GET',
                    mode: 'cors',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const shops = await shopRes.json();
                if (!shops || !shops.length) throw new Error('Магазины не найдены');
                const shopId = shops[0].id;

                // Шаг 2. Прямой запрос товаров
                const prodRes = await fetch(`https://api.printify.com/v1/shops/${shopId}/products.json`, {
                    method: 'GET',
                    mode: 'cors',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const prodData = await prodRes.json();
                
                // Шаг 3. Мгновенный вывод на экран
                container.innerHTML = '';
                if (!prodData.data || prodData.data.length === 0) {
                    container.innerHTML = '<div class="loader-text">Товары на подходе. Скоро запуск.</div>';
                    return;
                }

                prodData.data.forEach(product => {
                    const price = (product.variants[0]?.price / 100).toFixed(2);
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.images[0]?.src}" alt="${product.title}" class="product-img">
                        <h3 class="product-name">${product.title}</h3>
                        <div class="product-meta">
                            <span class="product-price">$${price}</span>
                            <button class="btn-buy">Заказать</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loader-text" style="color: #ff4444;">Ошибка загрузки витрины. Проверь токен.</div>';
            }
        }

        // Запуск
        initShop();
    </script>
