<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мерч Domus Architectus | Архитектор Антикризис — Официальный Магазин</title>
    <link rel="stylesheet" href="../style.css"> <!-- Подключаем твои стили сайта -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    
    <style>
        .merch-container { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .merch-title { text-align: center; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .merch-subtitle { text-align: center; color: #777; margin-bottom: 40px; font-style: italic; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid #222; background: #0b0b0b; padding: 20px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: auto; border-radius: 2px; margin-bottom: 15px; }
        .product-name { font-size: 1.2rem; margin: 10px 0; font-weight: bold; color: #fff; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .product-price { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .btn-buy { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-buy:hover { background: #ccc; }
        .loader-text { text-align: center; font-size: 1.5rem; color: #fff; padding: 50px; }
    </style>
</head>
<body style="background: #000; color: #fff;"> <!-- Держим брутальный черный стиль -->

    <header class="main-header">
        <div class="logo">Domus Architectus</div>
        <nav class="main-nav">
            <a href="../books/index.html">Книги</a>
            <a href="../music/index.html">Музыка</a>
            <a href="index.html" class="active-merch-link">Мерч</a>
            <a href="../guestbook/index.html">Гостевая Книга</a>
        </nav>
    </header>

    <main class="merch-container">
        <h1 class="merch-title">Официальный мерч</h1>
        <p class="merch-subtitle">Стиль и геометрия духа «Архитектор Антикризис»</p>

        <!-- Сюда скрипт загрузит товары -->
        <div id="products-container" class="products-grid">
            <div class="loader-text"><i class="fa-solid fa-spinner fa-spin"></i> Разворачиваю витрину...</div>
        </div>
    </main>
    <script>
        async function initShop() {
            const container = document.getElementById('products-container');
            try {
                const response = await fetch('/api/get-merch');
                const prodData = await response.json();
                
                container.innerHTML = '';

                // Если сервер прислал ошибку, выводим её
                if (prodData.error) {
                    container.innerHTML = `<div class="loader-text" style="color: #ff4444;">${prodData.error}</div>`;
                    return;
                }
                
                // Если товаров нет
                if (!prodData.data || prodData.data.length === 0) {
                    container.innerHTML = '<div class="loader-text">Витрина подключена успешно, но товаров пока нет. Создай и опубликуй первый макет в Printify!</div>';
                    return;
                }

                // Рендерим товары
                prodData.data.forEach(product => {
                    const price = (product.variants[0]?.price / 100).toFixed(2);
                    // Безопасный перегруз: если ссылки нет, отправляем в твой ТГ-канал или оставляем заглушку
                    const productUrl = product.external?.url || 'https://t.me/AntiKrizis_Strateg'; 
                    
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.images[0]?.src}" alt="${product.title}" class="product-img">
                        <h3 class="product-name">${product.title}</h3>
                        <div class="product-meta">
                            <span class="product-price">$${price}</span>
                            <a href="${productUrl}" target="_blank" rel="noopener" style="text-decoration: none;">
                                <button class="btn-buy">Заказать</button>
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loader-text" style="color: #ff4444;">Критическая ошибка сети. Перезагрузи страницу.</div>';
            }
        }

        initShop();
    </script>
</body>
</html>
